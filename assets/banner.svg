  <!-- Tagline -->
  <text x="400" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#888">The embedded database for agentic memory</text>
