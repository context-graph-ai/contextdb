      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="gg" x1="60" y1="140" x2="120" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="vg" x1="140" y1="140" x2="80" y2="100" gradientUnits="userSpaceOnUse">
