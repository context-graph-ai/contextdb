<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#0a0a0a"/>

  <defs>
    <linearGradient id="rg" x1="100" y1="40" x2="100" y2="120" gradientUnits="userSpaceOnUse">
