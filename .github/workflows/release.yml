name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write
  packages: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          CARGO=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/contextdb-engine/Cargo.toml)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi

  publish-crates:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in contextdb-core contextdb-tx contextdb-relational contextdb-graph contextdb-vector contextdb-parser contextdb-planner contextdb-engine contextdb-server contextdb-cli; do
            echo "Publishing $crate..."
            cargo publish -p $crate --allow-dirty
            sleep 30
          done

  publish-docker:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/context-graph-ai/contextdb-server:${{ github.ref_name }}
            ghcr.io/context-graph-ai/contextdb-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    needs: verify-version
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bins: contextdb-cli,contextdb-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bins: contextdb-cli,contextdb-server
          - target: x86_64-apple-darwin
            os: macos-latest
            bins: contextdb-cli
          - target: aarch64-apple-darwin
            os: macos-latest
            bins: contextdb-cli
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        run: |
          for bin in $(echo "${{ matrix.bins }}" | tr ',' ' '); do
            cargo build --release --target ${{ matrix.target }} -p $bin
          done
      - name: Package
        run: |
          mkdir -p dist
          for bin in $(echo "${{ matrix.bins }}" | tr ',' ' '); do
            cp target/${{ matrix.target }}/release/$bin dist/
          done
          tar czf ${{ matrix.target }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}.tar.gz

  github-release:
    needs: [publish-crates, publish-docker, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*/*.tar.gz

  publish-docs:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install mdBook
        run: cargo install mdbook
      - name: Build docs
        run: mdbook build
      - name: Dispatch to website repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          repository: context-graph-ai/contextdb-website
          event-type: docs-update
          client-payload: '{"ref": "${{ github.ref_name }}"}'
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: book/
