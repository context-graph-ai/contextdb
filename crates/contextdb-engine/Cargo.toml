[package]
name = "contextdb-engine"
version = "0.2.0"
edition = "2024"

[dependencies]
contextdb-core = { path = "../contextdb-core" }
contextdb-tx = { path = "../contextdb-tx" }
contextdb-relational = { path = "../contextdb-relational" }
contextdb-graph = { path = "../contextdb-graph" }
contextdb-vector = { path = "../contextdb-vector" }
contextdb-parser = { path = "../contextdb-parser" }
contextdb-planner = { path = "../contextdb-planner" }
roaring.workspace = true
uuid.workspace = true
parking_lot.workspace = true
rmp-serde.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[dev-dependencies]
contextdb-server = { path = "../contextdb-server" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
testcontainers = "0.27"

[[test]]
name = "integration"
path = "../../tests/integration.rs"
