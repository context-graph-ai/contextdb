# Deterministic Upsert — Input Fixture

setup:
  existing_rows:
    - {id: "entity-1", name: "original", version: 1}

operations:
  - description: "new row (no conflict)"
    sql: "INSERT INTO entities (id, name, version) VALUES ('entity-2', 'new-entity', 1) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name, version=EXCLUDED.version"

  - description: "conflict with update (different values)"
    sql: "INSERT INTO entities (id, name, version) VALUES ('entity-1', 'updated', 2) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name, version=EXCLUDED.version"

  - description: "conflict with no change (same values — idempotent)"
    sql: "INSERT INTO entities (id, name, version) VALUES ('entity-1', 'updated', 2) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name, version=EXCLUDED.version"
