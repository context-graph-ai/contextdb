    basis_diff:
      entity_id: "entity-rate-limiter"
      field_name: "rate_limit"
      old_value: 100        # basis snapshot value (at decision creation)
      new_value: 200        # current entity value
      cascade_from: null    # direct invalidation, not cascade

  - id: "<generated-uuid>"
    status: "pending"
    affected_decision_id: "decision-retry"
    trigger_observation_id: "obs-rate-change"
    severity: "warning"
    # warning because: confidence=0.7 >= 0.5 but < 0.8
    # cascade through CITES edge from decision-cache
    basis_diff:
      entity_id: "entity-rate-limiter"
      field_name: "rate_limit"
      old_value: 100
      new_value: 200
      cascade_from: "decision-cache"   # cascaded via CITES

